name: 🔢 Auto-Update Repo Count

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  push:
    branches: [ main ]
  workflow_dispatch:        # Manual trigger

jobs:
  update-count:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Push README changes
      metadata: read        # Read repo metadata via GraphQL

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run repo counter & update README
        env:
          # GH_PAT (repo scope) gives accurate private count.
          # Falls back to GITHUB_TOKEN for public-only count.
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: python scripts/count_repos.py

      - name: Commit & push if README changed
        run: |
          git config user.name  "SNTL84-Bot"
          git config user.email "3goldenlotusroots@gmail.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: auto-update repo count [skip ci]"
          git push
