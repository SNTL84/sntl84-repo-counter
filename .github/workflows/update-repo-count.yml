name: 🔢 Auto-Update Repo Count

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  push:
    branches: [ main ]
  workflow_dispatch:         # Manual trigger

jobs:
  update-count:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Run repo counter & update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}   # PAT with repo scope — add in Settings > Secrets
        run: python scripts/count_repos.py

      - name: Commit & push if README changed
        run: |
          git config user.name "SNTL84-Bot"
          git config user.email "3goldenlotusroots@gmail.com"
          git add README.md
          git diff --cached --quiet || git commit -m "🤖 auto-update: $(date -u '+%Y-%m-%d %H:%M UTC') · SNTL84"
          git push
