name: 'SNTL84 Repo Intelligence'

description: >-
  Fetch live GitHub stats for any user via REST & GraphQL API.
  Outputs repo count, total stars, top language, follower count
  and a full JSON payload — ready for dashboards, README badges
  and downstream workflow steps. Built by SNTL84 · desidevloper.com

author: 'Milan · SNTL84 · Golden Lotus · desidevloper.com'

branding:
  icon: 'activity'
  color: 'green'

# ── INPUTS ────────────────────────────────────────────────────
inputs:
  github-token:
    description: >
      GitHub token for API access. Use ${{ secrets.GITHUB_TOKEN }}
      for public repos. A PAT with read:user scope is required
      for private repo stats or higher rate limits (5000 req/hr).
    required: true

  target-user:
    description: >
      GitHub username to analyse.
      Defaults to the owner of the repository running this Action.
    required: false
    default: '${{ github.repository_owner }}'

  output-format:
    description: >
      Format for the stats-json output.
      Options: summary | json | markdown
    required: false
    default: 'json'

  include-private:
    description: >
      Set to true to include private repo count in totals.
      Requires a PAT with repo scope.
    required: false
    default: 'false'

# ── OUTPUTS ───────────────────────────────────────────────────
outputs:
  repo-count:
    description: 'Total number of public repositories for the target user'
    value: ${{ steps.run-counter.outputs.repo-count }}

  total-stars:
    description: 'Sum of stargazers_count across all public repositories'
    value: ${{ steps.run-counter.outputs.total-stars }}

  top-language:
    description: 'Most frequently used programming language across all repos'
    value: ${{ steps.run-counter.outputs.top-language }}

  followers:
    description: 'Total follower count for the target user'
    value: ${{ steps.run-counter.outputs.followers }}

  stats-json:
    description: 'Full stats payload as a JSON string'
    value: ${{ steps.run-counter.outputs.stats-json }}

# ── RUNTIME (composite — Python-based) ───────────────────────
runs:
  using: 'composite'
  steps:
    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip --quiet
        pip install requests --quiet

    - name: 🔢 Run SNTL84 Repo Intelligence
      id: run-counter
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        TARGET_USER: ${{ inputs.target-user }}
        OUTPUT_FORMAT: ${{ inputs.output-format }}
        INCLUDE_PRIVATE: ${{ inputs.include-private }}
      run: |
        python ${{ github.action_path }}/scripts/count_repos.py

